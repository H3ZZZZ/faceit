services:
  backend:
    container_name: faceit-backend
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx320m -XX:+UseSerialGC
      FACEIT_API_KEY: ${FACEIT_API_KEY}
      FACEIT_API_V1_URL: ${FACEIT_API_V1_URL:-https://www.faceit.com}
      FACEIT_API_V4_URL: ${FACEIT_API_V4_URL:-https://open.faceit.com}
    restart: unless-stopped